<ion-header class="ion-no-border">
  <ion-toolbar>
    @if(showBack()){
    <ion-buttons slot="start">
      <ion-button>
        <ion-back-button [defaultHref]="url()" color="medium" text=""></ion-back-button>
      </ion-button>
    </ion-buttons>
    }
    <ion-title class="ion-text-center ion-text-capitalize">{{titulo()}}</ion-title>
  </ion-toolbar>
</ion-header>
