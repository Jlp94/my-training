<app-header titulo="Suplementación" url="/tabs/diet" [showBack]="true"></app-header>

<ion-content class="ion-padding">
  <app-layout>
    <ion-grid>
      <ion-row>
        <ion-col size="12">
          <h4 class="ion-text-center"><strong>Sitios Recomendados</strong></h4>
        </ion-col>
      </ion-row>
      <ion-row>
        @for (brand of brands; track brand.name) {
        <ion-col size="12" size-md="6" size-lg="4">
          <ion-card [href]="brand.url">
            <ion-card-content>
              <div>
                <ion-img [src]="brand.image" [alt]="brand.name"></ion-img>
              </div>
            </ion-card-content>
          </ion-card>
        </ion-col>
        }
      </ion-row>
    </ion-grid>
  </app-layout>
</ion-content>
