<ion-content>
  <app-layout>
      <ion-card-content class="ion-text-center">
        <div class="ion-display-flex ion-justify-content-center">
          <ion-avatar class="ion-margin-bottom custom-avatar">
            <ion-img src="assets/images/logo.png" alt="Logo"></ion-img>
          </ion-avatar>
        </div>

        <p class="subtitle">Accede con tu cuenta</p>

        <div class="form-container ion-text-left">
          <div class="input-group">
            <ion-item lines="none" class="custom-input">
              <ion-icon name="mail-outline" slot="start" color="secondary"></ion-icon>
              <ion-input type="email" placeholder="Email" [ngModel]="email()" (ngModelChange)="email.set($event)"></ion-input>
            </ion-item>
          </div>

          <div class="input-group">
            <ion-item lines="none" class="custom-input">
              <ion-icon name="lock-closed-outline" slot="start" color="secondary"></ion-icon>
              <ion-input [type]="showPassword() ? 'text' : 'password'" placeholder="Contraseña" [ngModel]="password()"
                (ngModelChange)="password.set($event)"></ion-input>
            </ion-item>
          </div>
          <div class="remember-row">
            <ion-checkbox [ngModel]="rememberMe()" (ngModelChange)="rememberMe.set($event)" color="secondary"></ion-checkbox>
            <ion-label>Recordarme</ion-label>
          </div>

          <ion-button expand="block" shape="round" (click)='onLogin()' color="secondary" [disabled]="isLoggingIn()">
            @if (isLoggingIn()) {
              <ion-spinner name="dots" color="light"></ion-spinner>
            } @else {
              Entrar
            }
          </ion-button>
        </div>
      </ion-card-content>
  </app-layout>
</ion-content>
