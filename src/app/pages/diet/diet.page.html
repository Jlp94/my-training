<app-header titulo="diet" [showBack]="true"></app-header>

<ion-content>
  @for(i of options; track $index){
  <ion-card mode="ios" class="ion-text-center ion-padding">
    <ion-icon name="{{i.img}}" size="large" color="primary"></ion-icon>
    <ion-card-content>
      <p>{{i.title}}</p>
    </ion-card-content>
  </ion-card>
  }
</ion-content>
